<!DOCTYPE html>
<html>
<head>
  <title>主播经纪系统</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .form {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }

    .card {
      background: white;
      width: 220px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      background: #ff4d6d;
      color: white;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 5px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: green;
    }

    .delete {
      margin-top: 10px;
      background: red;
      color: white;
      border: none;
      padding: 5px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>主播资料系统</h1>

<div class="form">
  <input id="name" placeholder="主播名字">
  <input id="type" placeholder="风格（甜美/御姐等）">
  <button onclick="addHost()">添加主播</button>
</div>

<div class="container" id="container"></div>

<script>
let hosts = JSON.parse(localStorage.getItem("hosts")) || [];

function render() {
  const container = document.getElementById("container");
  container.innerHTML = "";

  hosts.forEach((host, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="name">${host.name}</div>
      <div class="tag">${host.type}</div>
      <div class="status">状态：招募中</div>
      <button class="delete" onclick="deleteHost(${index})">删除</button>
    `;

    container.appendChild(card);
  });
}

function addHost() {
  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;

  if (!name || !type) {
    alert("请填写完整信息");
    return;
  }

  hosts.push({ name, type });

  localStorage.setItem("hosts", JSON.stringify(hosts));

  document.getElementById("name").value = "";
  document.getElementById("type").value = "";

  render();
}

function deleteHost(index) {
  hosts.splice(index, 1);
  localStorage.setItem("hosts", JSON.stringify(hosts));
  render();
}

render();
</script>

</body>
</html>
