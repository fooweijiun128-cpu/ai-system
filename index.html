<!DOCTYPE html>
<html>
<head>
  <title>主播经纪系统</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }

    .card {
      background: white;
      width: 250px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      background: #ff4d6d;
      color: white;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 5px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: green;
    }
  </style>
</head>
<body>

<h1>主播资料系统</h1>

<div class="container">

  <div class="card">
    <div class="name">Luna</div>
    <div class="tag">甜美系</div>
    <div class="status">状态：招募中</div>
  </div>

  <div class="card">
    <div class="name">Miko</div>
    <div class="tag">御姐系</div>
    <div class="status">状态：已签约</div>
  </div>

  <div class="card">
    <div class="name">Aya</div>
    <div class="tag">可爱系</div>
    <div class="status">状态：面试中</div>
  </div>

</div>

</body>
</html>
