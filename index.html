<script>
let hosts = JSON.parse(localStorage.getItem("hosts")) || [];

function renderHosts() {
  const container = document.querySelector(".container");

  container.innerHTML = `
    <div class="card">
      <div class="name">Luna</div>
      <div class="tag">甜美系</div>
      <div class="status">状态：招募中</div>
    </div>

    <div class="card">
      <div class="name">Miko</div>
      <div class="tag">御姐系</div>
      <div class="status">状态：已签约</div>
    </div>

    <div class="card">
      <div class="name">Aya</div>
      <div class="tag">可爱系</div>
      <div class="status">状态：面试中</div>
    </div>
  `;

  hosts.forEach(host => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="name">${host.name}</div>
      <div class="tag">${host.type}</div>
      <div class="status">状态：招募中</div>
    `;

    container.appendChild(card);
  });
}

function addHost() {
  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;

  if (!name || !type) {
    alert("请填写完整信息");
    return;
  }

  hosts.push({
    name: name,
    type: type
  });

  localStorage.setItem("hosts", JSON.stringify(hosts));

  document.getElementById("name").value = "";
  document.getElementById("type").value = "";

  renderHosts();
}

renderHosts();
</script>
